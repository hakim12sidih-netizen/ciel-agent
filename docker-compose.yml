version: "3.9"

services:
  ciel-api:
    build: .
    container_name: ciel-api
    ports:
      - "8765:8765"
    environment:
      - CIEL_LOG_LEVEL=INFO
      - CIEL_API_KEYS=${CIEL_API_KEYS:-ciel-dev-key}
    volumes:
      - ciel_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8765/v1/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  ciel_data:
